<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support SAARATHI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  font-family: "Open Sans", sans-serif;
  background: #f8f9fa;
}

.donate-card {
  border-radius: 25px;
  padding: 50px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.1);
  background: white;
}

.amount-btn {
  border-radius: 50px;
  padding: 10px 25px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container py-5">
<div class="row justify-content-center">
<div class="col-lg-8">

<div class="donate-card text-center">

<h2 class="fw-bold mb-4">Support Education. Change Lives.</h2>
<p class="mb-4 text-muted">
Your contribution helps provide books, digital tools,
and mentorship to rural students.
</p>

<div class="d-flex justify-content-center gap-3 mb-4 flex-wrap">
<button class="btn btn-outline-primary amount-btn">₹500</button>
<button class="btn btn-outline-primary amount-btn">₹1000</button>
<button class="btn btn-outline-primary amount-btn">₹2500</button>
<button class="btn btn-outline-primary amount-btn">Custom</button>
</div>

<a href="#" class="btn btn-primary px-5 py-2 rounded-pill fw-bold">
Proceed to Payment
</a>

</div>

</div>
</div>
</div>

</html>
